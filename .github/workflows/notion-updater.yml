name: Actualizar Notion Main Page

on:
  schedule:
    # De hora em hora das 7h às 23h hora de Lisboa (UTC+1 = 6h às 22h UTC)
   - cron: '*/10 6-22 * * *'
  workflow_dispatch:  # Permite correr manualmente no GitHub

jobs:
  promote-tasks:
    # Corre só uma vez por dia às 7h Lisboa (6h UTC) — promove recurring tasks de Inbox → To-Do
    if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Promover tarefas recorrentes
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python promote_tasks.py

  update-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests

      - name: Correr script de actualização
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python update_notion.py
