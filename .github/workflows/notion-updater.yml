name: Actualizar Notion Main Page

on:
  schedule:
    # De 10 em 10 minutos das 7h às 23h hora de Lisboa (UTC+1 = 6h às 22h UTC)
    - cron: '*/10 6-22 * * *'
  workflow_dispatch:

jobs:
  update-notion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Correr script de actualização
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python update_notion.py
