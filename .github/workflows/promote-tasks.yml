name: Promover Tarefas Recorrentes

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  promote-tasks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Promover tarefas recorrentes
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python promote_tasks.py
